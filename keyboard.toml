[keyboard]
name = "Dionysus_Planck"
product_name = "Agent Orange J"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RMK"
chip = "nrf52840"

[matrix]
# Input and output pins are mandatory
input_pins = ["P1_11", "P0_03", "P0_28", "P1_13", "P0_02", "P0_29", "P0_31", "P0_30", "P1_06", "P0_20", "P0_17", "P0_15"]
output_pins = ["P0_13", "P0_24", "P0_09", "P0_10", "P0_08"]
# WARNING: Currently row2col/col2row is set in RMK's feature gate, row2col config here is valid ONLY when you're using cloud compilation.
# Checkout doc here: https://rmk.rs/docs/user_guide/faq.html#my-matrix-is-row2col-the-matrix-doesn-t-work
row2col = true

[layout]
rows = 12
cols = 5
layers = 9
keymap = [
    [
        [ "Q", "W", "F", "P", "G", "_", "_", "J", "L", "U",     "Y",    "Backspace"],
        [ "A", "R", "S", "T", "D", "_", "_", "H", "N", "E",     "I",    "O"],
        [ "Z", "X", "C", "V", "B", "_", "_", "K", "M", "Comma", "Dot",  "Slash"],
        [ "LAlt", "LGui", "F", "P", "G", "_", "_", "J", "L", "U", "Y", "Backspace"],
    ],
    [
        ["TO(1)", "TT(1)", "TG(2)"],
        ["DF(1)", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"]
    ],
]


[ble]
enabled = true
# vddh has an internal voltage divider
# battery_adc_pin = "vddh"
# Or
battery_adc_pin = "P0_04"
adc_divider_measured = 2000
adc_divider_total = 2806

# charge_state.pin = "P0_25"
# charge_state.low_active = false
# charge_led.pin = "P0_29"
# charge_led.low_active = false
